apiVersion: node.harvesterhci.io/v1beta1
kind: CloudInit
metadata:
  name: ssh-keys
spec:
  matchSelector: 
    harvesterhci.io/managed: "true"
  filename: 99-ssh-keys
  contents: |
    stages:
      network:
        - name: "add rsa ssh keys"
          authorized_keys:
            rancher:
              - ssh-rsa 
              - ssh-rsa 
              - ssh-rsa 
  paused: false