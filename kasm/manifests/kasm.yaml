apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: kasm
  namespace: kube-system
spec:
  chartContent: 
  createNamespace: true
  failurePolicy: reinstall
  targetNamespace: kasm-system
  valuesContent: |
    certificate:
      secretName: tls-kasm-ingress
      certManager:
        enabled: true
        addWildCard: true
        issuerName: ca-issuer
        issuerKind: ClusterIssuer
    components:
      api:
        image:
          repository: registry.localdomain:5000/kasmweb/api
      guac:
        image:
          repository: registry.localdomain:5000/kasmweb/kasm-guac
      manager:
        image:
          repository: registry.localdomain:5000/kasmweb/manager
      proxy:
        image:
          repository: registry.localdomain:5000/kasmweb/proxy
      rdpHttpsGateway:
        image:
          repository: registry.localdomain:5000/kasmweb/rdp-https-gateway
    database:
      image:
        repository: registry.localdomain:5000/kasmweb/postgres
    ingress:
      enabled: true
      tls: true
    proxyService:
      type: ClusterIP
    publicAddr: kasm.localdomain
