apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  chartContent: 
  createNamespace: true
  failurePolicy: reinstall
  targetNamespace: cert-manager
  valuesContent: |-
    crds:
      enabled: true
      keep: true
    global:
      imageRegistry: registry.localdomain:5000
