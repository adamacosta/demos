#cloud-config
packages:
  - rke2-selinux
  - rke2-server
package_update: false
runcmd:
  - - systemctl
    - enable
    - '--now'
    - qemu-guest-agent
  - - systemctl
    - restart
    - systemd-modules-load
  - - cp
    - /usr/share/rke2/rke2-cis-sysctl.conf
    - /etc/sysctl.d/60-rke2-cis.conf
  - - systemctl
    - restart
    - systemd-sysctl
  - - iptables
    - -t
    - filter
    - -A
    - OUTPUT
    - -d 
    - 127.0.0.0/8
    - -j
    - ACCEPT
  - - iptables
    - -t
    - filter
    - -A
    - OUTPUT
    - -d 
    - 10.0.0.0/8
    - -j
    - ACCEPT
  - - iptables
    - -t
    - filter
    - -A
    - OUTPUT
    - -d 
    - 172.16.0.0/12
    - -j
    - ACCEPT
  - - iptables
    - -t
    - filter
    - -A
    - OUTPUT
    - -d 
    - 192.168.0.0/16
    - -j
    - ACCEPT
  - - iptables
    - -t
    - filter
    - -A
    - OUTPUT
    - -d 
    - 169.254.0.0/16
    - -j
    - ACCEPT
  - - iptables
    - -t
    - filter
    - -A
    - OUTPUT
    - -j
    - DROP
users:
  - name: rancher
    gecos: "cloud-init default user"
    primary_group: rancher
    groups: wheel,systemd-journal
    lock_passwd: false
    passwd: $6$MoLb08YLnZZJ6Mfr$Z6YM6GeWAyUo/wtDZVmfw/PNmZFBivZeB6OdYiFqIh1NC09FFKnPioRw8hJ1qxmD2qQVXOs1abRE4St2X5QFr.
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGUV5mYJt2mNSayglG9+ez4W66Cj5PdBfvg5+Mqf+e9G
    sudo: [ "ALL=(ALL) NOPASSWD:ALL" ]
  - name: etcd
    gecos: "etcd user"
    shell: /sbin/nologin
    system: true
write_files:
  - content: |
      br_netfilter
      ip_vs
      ip_vs_rr
      macvlan
      overlay
    path: /etc/modules-load.d/rke2.conf
  - content: |
      [keyfile]
      unmanaged-devices=interface-name:cilium*;interface-name:lxc*
    path: /etc/NetworkManager/conf.d/rke2-cilium.conf
  - encoding: b64
    content: 
    path: /var/lib/rancher/rke2/etc/config-files/cloud-provider-config
  - encoding: b64
    content: 
    path: /etc/rancher/rke2/audit-policy.yaml
  - encoding: b64
    content: 
    path: /etc/rancher/rke2/config.yaml
  - encoding: b64
    content: 
    path: /etc/rancher/rke2/rancher-pss.yaml
  - encoding: b64
    content: 
    path: /etc/rancher/rke2/registries.yaml
  - encoding: b64
    content: YXBpVmVyc2lvbjogaGVsbS5jYXR0bGUuaW8vdjEKa2luZDogSGVsbUNoYXJ0Q29uZmlnCm1ldGFkYXRhOgogIG5hbWU6IGhhcnZlc3Rlci1jbG91ZC1wcm92aWRlcgogIG5hbWVzcGFjZToga3ViZS1zeXN0ZW0Kc3BlYzoKICB2YWx1ZXNDb250ZW50OiB8LQogICAgZ2xvYmFsOgogICAgICBjYXR0bGU6CiAgICAgICAgY2x1c3Rlck5hbWU6IHJhbmNoZXI=
