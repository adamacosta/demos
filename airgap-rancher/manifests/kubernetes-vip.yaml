---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: api-ip
  namespace: metallb-system
spec:
  addresses:
    - 192.168.3.2/32
  avoidBuggyIPs: true
  serviceAllocation:
    namespaces:
      - default
    serviceSelectors:
      - matchExpressions:
        - key: serviceType
          operator: In
          values:
            - kubernetes-vip
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: api-ip-l2-adv
  namespace: metallb-system
spec:
  ipAddressPools:
    - api-ip
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-vip
  namespace: default
  labels:
    serviceType: kubernetes-vip
spec:
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  ports:
    - name: rke2-api
      port: 9345
      protocol: TCP
      targetPort: 9345
    - name: k8s-api
      port: 6443
      protocol: TCP
      targetPort: 6443
  type: LoadBalancer